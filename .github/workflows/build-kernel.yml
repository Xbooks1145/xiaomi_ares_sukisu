name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      enable_cgroup_patch:
        description: "是否启用 Cgroup (Cgroupv2 + Workingset) 补丁"
        required: false
        default: false
        type: boolean

      enable_feature_kpm:
        description: "是否启用kpm"
        required: false
        default: false
        type: boolean

      enable_rekernel:
        description: "是否启用ReKernel"
        required: false
        default: false
        type: boolean

      SOURCECODE_BRANCH:
        description: '源码分支名称或修订版'
        required: true
        default: 'U-dev'

      SUKISU_BRANCH:
        description: 'SukiSU 分支名称或修订版'
        required: true
        default: 'builtin'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_DIR: /home/runner/.ccache
      CCACHE_MAXSIZE: 8G
      REKERNEL_ENABLE: ${{ inputs.enable_rekernel && 'true' || 'false' }}

    strategy:
      fail-fast: false

    name: Build Kernel for K40GE

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Package
        run: sudo apt update && sudo apt install -y p7zip-full git ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - uses: actions/checkout@v5

      - name: Get Kernel Source Code
        uses: actions/checkout@v5
        with:
          repository: MerCuJerry/android_kernel_aresin
          ref: ${{ inputs.SOURCECODE_BRANCH }}
          path: kernel
      
      - name: Setup Cross-compile toolchain
        run: |
          mkdir -p toolchain
          cd toolchain
          wget -q https://github.com/Mandi-Sa/clang/releases/download/amd64-kernel-arm_static-22/llvm22.0.0-binutils2.44_amd64-kernel-arm_static-20251116.7z
          7za x llvm22.0.0-binutils2.44_amd64-kernel-arm_static-20251116.7z
          rm llvm22.0.0-binutils2.44_amd64-kernel-arm_static-20251116.7z

      - name: Set up SukiSU
        working-directory: kernel
        run: |
          echo DATE=$(date +%F) >> $GITHUB_ENV
          export BRANCH=${{ inputs.SUKISU_BRANCH }}
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s $BRANCH
          cd ./KernelSU
          export KSU_VERSION=$(expr $(/usr/bin/git rev-list --count main) "+" 40000 "-" 2815)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Get SukiSU Patches
        uses: actions/checkout@v5
        with:
          repository: SukiSU-Ultra/SukiSU_patch
          path: sukisu_patch

      - name: Get susfs4ksu
        run: |
          git clone -b kernel-4.14 --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/fs/* $GITHUB_WORKSPACE/kernel/fs/
          cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/include/linux/* $GITHUB_WORKSPACE/kernel/include/linux/

      - name: Get susfs Update patch
        uses: actions/checkout@v5
        with:
          repository: JackA1ltman/NonGKI_Kernel_Build_2nd
          sparse-checkout: Patches/Patch
          ref: mainline
          path: susfs_upgrade_patch

      - name: Patch Kernel
        working-directory: kernel
        run: |
          patch -p1 < $GITHUB_WORKSPACE/Patches/susfs-syscall-hooks.patch

      # ★★★ 新增：Cgroup Patch（启用时插入该模块） ★★★
      - name: Apply Cgroup Patches
        if: ${{ inputs.enable_cgroup_patch }}
        working-directory: kernel
        run: |
          echo "==[Cgroup]== 应用 cgroupv2_fork_to_49.patch"
          patch -p1 < $GITHUB_WORKSPACE/Patches/cgroupv2_fork_to_49.patch || true

          echo "==[Cgroup]== 应用 cgroup_workingset.patch"
          patch -p1 < $GITHUB_WORKSPACE/Patches/cgroup_workingset.patch || true

      - name: Patch ReKernel
        if: env.REKERNEL_ENABLE == 'true'
        shell: bash
        working-directory: kernel
        run: |
          cp $GITHUB_WORKSPACE/Patches/Rekernel/rekernel_patches.sh ./
          bash rekernel_patches.sh

          mkdir -p drivers/rekernel
          cp $GITHUB_WORKSPACE/Patches/Rekernel/rekernel_extra.patch ./
          patch -p1 < rekernel_extra.patch || true

          echo "Patched Re:Kernel for your kernel successfully."

      - name: Apply KernelPatch for SUSFS
        working-directory: kernel
        run: |
          patch -p1 -F 3 < $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch
          patch -p1 < $GITHUB_WOR
